<div class="app-layout">
  
  <!-- SIDEBAR INTERATIVA - Apenas exibida no Painel Administrativo -->
  @if (showAdminLayout()) {
    <aside class="app-sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <img src="logo.png" alt="Logo" class="sidebar-logo-img" />
        </div>
        <div class="brand-text">
          <h1>Motor-Api</h1>
          <span>SISTEMA TÉCNICO</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <p class="nav-label">CADASTROS</p>
        
        <a routerLink="/motores" routerLinkActive="active-link">
          <img src="motor.png" class="sidebar-nav-icon" alt="Motores" /> Motores
        </a>
        
        <a routerLink="/pistoes" routerLinkActive="active-link">
          <img src="pistao.png" class="sidebar-nav-icon" alt="Pistões" /> Pistões
        </a>
        
        <a routerLink="/radiadores" routerLinkActive="active-link">
          <img src="radiador.png" class="sidebar-nav-icon" alt="Radiadores" /> Radiadores
        </a>
        
        <a routerLink="/turbos" routerLinkActive="active-link">
          <img src="turbo.png" class="sidebar-nav-icon" alt="Turbos" /> Turbos
        </a>
        
        <a routerLink="/superchargers" routerLinkActive="active-link">
          <span class="nav-icon">⚡</span> Superchargers
        </a>
        
        <a routerLink="/veiculos" routerLinkActive="active-link">
          <span class="nav-icon">🏎️</span> Veículos
        </a>
      </nav>

      <div class="sidebar-user">
        <div class="user-avatar">G</div>
        <div class="user-details">
          <p class="user-name">Gustavo</p>
          <p class="user-status">Online</p>
        </div>
        <!-- Botão de Sair do Painel -->
        <button class="logout-sidebar-btn" (click)="logout()" title="Sair do Painel">
          🚪 Sair
        </button>
      </div>
    </aside>
  }

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="app-content" [class.no-sidebar]="!showAdminLayout()">
    @if (showAdminLayout()) {
      <header class="content-header">
        <div class="breadcrumb">Gerenciamento de Componentes</div>
        
        <!-- Botão Dinâmico Inteligente -->
        <button class="add-btn" [routerLink]="actionInfo().link">
          + {{ actionInfo().label }}
        </button>
      </header>
    }

    <div class="content-body" [class.no-padding]="!showAdminLayout()">
      <router-outlet />
    </div>
  </main>

</div>
