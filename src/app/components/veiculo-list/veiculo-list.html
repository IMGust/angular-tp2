<div class="header">
  <h2>Veículos</h2>
</div>

<div class="table-container">
  <table class="motor-table">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Modelo</th>
        <th>Ano</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      @for (item of veiculos(); track item.id) {
        <tr>
          <td>{{ item.nome }}</td>
          <td>{{ item.modelo }}</td>
          <td>{{ item.ano }}</td>
          <td>
            <div class="actions">
              <a [routerLink]="['/veiculos/editar', item.id]" class="btn-icon edit" title="Editar">
                <i class="icon-edit">✏️</i>
              </a>
              <button (click)="excluir(item.id)" class="btn-icon delete" title="Excluir">
                <i class="icon-delete">🗑️</i>
              </button>
            </div>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="4" class="empty-state">Nenhum veículo cadastrado.</td>
        </tr>
      }
    </tbody>
  </table>
</div>

<mat-paginator [length]="totalElements()"
               [pageSize]="pageSize()"
               [pageSizeOptions]="[5, 10, 25, 100]"
               (page)="onPageChange($event)"
               aria-label="Selecione a página">
</mat-paginator>
