<div class="form-container">
  <div class="header">
    <h2>{{ form.get('id')?.value ? 'Editar Veículo' : 'Novo Veículo' }}</h2>
  </div>

  <form [formGroup]="form" (ngSubmit)="salvar()">
    <div class="form-grid">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input id="nome" type="text" formControlName="nome" placeholder="Ex: Corolla">
      </div>

      <div class="form-group">
        <label for="modelo">Modelo</label>
        <input id="modelo" type="text" formControlName="modelo" placeholder="Ex: XEI">
      </div>

      <div class="form-group">
        <label for="ano">Ano</label>
        <input id="ano" type="number" formControlName="ano" placeholder="2024">
      </div>
    </div>

    <div class="form-actions">
      <button type="button" routerLink="/veiculos" class="btn btn-secondary">Cancelar</button>
      <button type="submit" [disabled]="form.invalid" class="btn btn-primary">
        {{ form.get('id')?.value ? 'Salvar Alterações' : 'Cadastrar Veículo' }}
      </button>
    </div>
  </form>
</div>
