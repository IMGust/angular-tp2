<div class="form-container">
  <div class="header">
    <h2>{{ form.get('id')?.value ? 'Editar Radiador' : 'Novo Radiador' }}</h2>
  </div>

  <form [formGroup]="form" (ngSubmit)="salvar()">
    <div class="form-grid">
      <div class="form-group">
        <label for="marca">Marca</label>
        <input id="marca" type="text" formControlName="marca" placeholder="Ex: Mishimoto">
      </div>

      <div class="form-group">
        <label for="tipo">Tipo</label>
        <input id="tipo" type="text" formControlName="tipo" placeholder="Ex: Alumínio">
      </div>

      <div class="form-group">
        <label for="capacidadeFluidoLitros">Capacidade (L)</label>
        <input id="capacidadeFluidoLitros" type="number" formControlName="capacidadeFluidoLitros" placeholder="0.0" step="0.1">
      </div>

      <div class="form-group">
        <label for="dissipacaoTermicaBTU">Dissipação Térmica (BTU)</label>
        <input id="dissipacaoTermicaBTU" type="number" formControlName="dissipacaoTermicaBTU" placeholder="0.0" step="0.1">
      </div>

      <div class="form-group">
        <label for="fileiras">Fileiras</label>
        <input id="fileiras" type="number" formControlName="fileiras" placeholder="1">
      </div>

      <div class="form-group">
        <label for="preco">Preço (R$)</label>
        <input id="preco" type="number" formControlName="preco" placeholder="0.00">
      </div>
    </div>

    <div class="form-actions">
      <button type="button" routerLink="/radiadores" class="btn btn-secondary">Cancelar</button>
      <button type="submit" [disabled]="form.invalid" class="btn btn-primary">
        {{ form.get('id')?.value ? 'Salvar Alterações' : 'Cadastrar Radiador' }}
      </button>
    </div>
  </form>
</div>
