<div class="form-container">
  <div class="header">
    <h2>{{ form.get('id')?.value ? 'Editar Pistão' : 'Novo Pistão' }}</h2>
  </div>

  <form [formGroup]="form" (ngSubmit)="salvar()">
    <div class="form-grid">
      <div class="form-group">
        <label for="marca">Marca</label>
        <input id="marca" type="text" formControlName="marca" placeholder="Ex: Wiseco">
      </div>

      <div class="form-group">
        <label for="material">Material</label>
        <input id="material" type="text" formControlName="material" placeholder="Ex: Alumínio Forjado">
      </div>

      <div class="form-group">
        <label for="diametro">Diâmetro (mm)</label>
        <input id="diametro" type="number" formControlName="diametro" placeholder="0.0" step="0.1">
      </div>

      <div class="form-group">
        <label for="curso">Curso (mm)</label>
        <input id="curso" type="number" formControlName="curso" placeholder="0.0" step="0.1">
      </div>

      <div class="form-group">
        <label for="volumeDomo">Volume Domo (cc)</label>
        <input id="volumeDomo" type="number" formControlName="volumeDomo" placeholder="0.0" step="0.1">
      </div>

      <div class="form-group">
        <label for="preco">Preço (R$)</label>
        <input id="preco" type="number" formControlName="preco" placeholder="0.00">
      </div>
    </div>

    <div class="form-actions">
      <button type="button" routerLink="/pistoes" class="btn btn-secondary">Cancelar</button>
      <button type="submit" [disabled]="form.invalid" class="btn btn-primary">
        {{ form.get('id')?.value ? 'Salvar Alterações' : 'Cadastrar Pistão' }}
      </button>
    </div>
  </form>
</div>
